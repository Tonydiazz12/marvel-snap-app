<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Snap API Explorer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark glass-effect mb-4 border-0 rounded-0">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#">Cartas Marvel</a>
            <div class="d-flex align-items-center text-info">
                <span class="me-2 text-white-50">Tu IP:</span>
                <span id="client-ip" class="fw-bold spinner-border spinner-border-sm text-info" role="status"></span>
            </div>
        </div>
    </nav>

    <main class="container my-4 flex-grow-1">
        <div class="row mb-5">
            <div class="col-md-7 mx-auto text-center glass-effect p-4">
                <h2 class="mb-3 text-white">Explorador de Cartas</h2>
                <p class="text-white-50 mb-4">Selecciona una carta de la lista para ver sus estadísticas.</p>
                
                <select id="card-select" class="form-select form-select-lg glass-effect border-secondary" disabled>
                    <option selected>Cargando cartas...</option>
                </select>
            </div>
        </div>

        <div class="row" id="results-container">
            </div>
        <div class="row mt-5" id="catalog-container"></div>
    </main>

    <footer class="text-center py-3 mt-auto glass-effect border-0 rounded-0">
        <div class="container">
            <p class="mb-0 text-white-50">Desarrollado por <strong class="text-white">Tony Diaz</strong> | Tonydiazz.com &copy; 2026</p>
        </div>
    </footer>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
